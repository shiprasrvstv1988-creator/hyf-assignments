openapi: 3.0.0
info:
  title: Snippets API
  description: A safe and robust API for managing code snippets.
  version: 1.0.0

servers:
  - url: http://localhost:3000/api
    description: Local development server

paths:
  /snippets:
    get:
      summary: Get all snippets
      description: Returns a list of all snippets with optional sorting.
      parameters:
        - name: sort
          in: query
          description: Sort by column and direction (e.g., "title desc")
          schema:
            type: string
      responses:
        "200":
          description: A list of snippets.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  data:
                    {
                      type: array,
                      items: { $ref: "#/components/schemas/Snippet" },
                    }

    post:
      summary: Create a new snippet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewSnippet"
      responses:
        "201":
          description: Snippet created successfully.
        "400":
          description: Missing required fields or invalid data.

  /snippets/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    get:
      summary: Get a snippet by ID
      responses:
        "200":
          description: A single snippet object.
        "404":
          description: Snippet not found.
    delete:
      summary: Delete a snippet
      responses:
        "200":
          description: Snippet deleted successfully.

  /snippets/public:
    get:
      summary: Get non-private snippets
      responses:
        "200":
          description: List of public snippets.

  /search:
    get:
      summary: Search snippets
      parameters:
        - name: q
          in: query
          required: true
          description: The search term
          schema:
            type: string
      responses:
        "200":
          description: Filtered results.
        "400":
          description: Missing search query.

components:
  schemas:
    Snippet:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        contents: { type: string }
        user_id: { type: integer }
        is_private: { type: boolean }

    NewSnippet:
      type: object
      required:
        - title
        - contents
        - user_id
      properties:
        title: { type: string }
        contents: { type: string }
        user_id: { type: integer }
        is_private: { type: boolean, default: false }

    Error:
      type: object
      properties:
        error: { type: string }
